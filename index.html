<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIGHER AD | ADMIN</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    /* ── 광고분류 페이지 ── */
    .ac-section-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin:22px 0 10px}
    .ac-upload-zone{border:2px dashed var(--border);border-radius:14px;padding:32px 20px;text-align:center;background:#f8fafc;cursor:pointer;transition:.2s;position:relative}
    .ac-upload-zone:hover,.ac-upload-zone.drag-over{border-color:var(--accent);background:rgba(16,185,129,.04)}
    .ac-upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .ac-upload-icon{font-size:32px;margin-bottom:10px}
    .ac-upload-label{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
    .ac-upload-sub{font-size:12px;color:var(--muted)}
    .ac-upload-fname{margin-top:10px;font-size:13px;font-weight:600;color:var(--accent);display:none}
    .ac-group-editor{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .ac-group-row{display:flex;align-items:flex-start;border-bottom:1px solid var(--border)}
    .ac-group-row:last-child{border-bottom:none}
    .ac-group-label{width:90px;padding:12px 14px;font-size:13px;font-weight:700;background:#f8fafc;border-right:1px solid var(--border);display:flex;align-items:center;flex-shrink:0}
    .ac-group-label.agency{color:#22c55e}.ac-group-label.direct{color:var(--warn)}.ac-group-label.solo{color:var(--info)}
    .ac-group-stores{flex:1;padding:8px 10px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;min-height:44px}
    .ac-tag{display:inline-flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:3px 7px;font-size:12px;font-weight:500}
    .ac-tag .ac-del{cursor:pointer;color:var(--muted);font-size:15px;line-height:1;transition:.15s}
    .ac-tag .ac-del:hover{color:var(--danger)}
    .ac-add-input{border:none;outline:none;font-size:12px;background:transparent;width:110px;padding:2px 4px;color:var(--text);font-family:inherit}
    .ac-run-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;margin-top:18px;font-family:inherit}
    .ac-run-btn:hover:not(:disabled){background:var(--accent2);box-shadow:0 6px 20px rgba(16,185,129,.3);transform:translateY(-1px)}
    .ac-run-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none;box-shadow:none}
    .ac-result-wrap{margin-top:24px}
    .ac-result-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .ac-result-title{font-size:15px;font-weight:800}
    .ac-result-meta{font-size:11px;color:var(--muted);margin-top:2px}
    .ac-export-btn{padding:7px 13px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:.2s;font-family:inherit}
    .ac-export-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
    .ac-tbl-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
    .ac-tbl{width:100%;border-collapse:collapse;font-size:13px}
    .ac-tbl thead th{background:#f8fafc;padding:10px 12px;text-align:center;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
    .ac-tbl thead th:nth-child(2){text-align:left}
    .ac-tbl tbody td{padding:9px 12px;border-bottom:1px solid #f1f5f9;text-align:center;color:var(--text)}
    .ac-tbl tbody td:nth-child(2){text-align:left;font-weight:500}
    .ac-tbl tbody tr:last-child td{border-bottom:none}
    .ac-tbl .ac-total-row td{background:#f1f5f9;font-weight:800;border-top:2px solid var(--border)}
    .ac-bg-agency{background:rgba(34,197,94,.05)}.ac-bg-direct{background:rgba(245,158,11,.05)}.ac-bg-solo{background:rgba(59,130,246,.05)}
    .ac-sum-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:5px}
    .ac-badge-agency{background:rgba(34,197,94,.15);color:#16a34a}.ac-badge-direct{background:rgba(245,158,11,.15);color:#d97706}.ac-badge-solo{background:rgba(59,130,246,.15);color:#2563eb}
    #ac-toast{position:fixed;bottom:24px;right:24px;z-index:9999;padding:11px 16px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;opacity:0;transform:translateY(6px);transition:all .3s;pointer-events:none}
    #ac-toast.show{opacity:1;transform:translateY(0)}
    #ac-toast.ac-success{background:var(--accent)}#ac-toast.ac-error{background:var(--danger)}
  </style>
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
  <style>
    :root {
      --bg:#f0f4f8; --sidebar:#0f172a; --accent:#10b981; --accent2:#059669;
      --muted:#94a3b8; --card:#ffffff; --border:#e2e8f0;
      --text:#1e293b; --text2:#64748b; --danger:#ef4444; --warn:#f59e0b; --info:#3b82f6;
    }
    *, *::before, *::after { box-sizing:border-box; }
    body { margin:0; font-family:'Pretendard',sans-serif; background:var(--bg); display:none; min-height:100vh; color:var(--text); }

    aside { width:240px; background:var(--sidebar); color:#fff; display:flex; flex-direction:column; position:fixed; height:100vh; z-index:100; }
    .brand { padding:32px 24px 24px; cursor:pointer; }
    .brand-name { font-size:20px; font-weight:900; letter-spacing:-0.5px; }
    .brand-name span { color:var(--accent); }
    .brand-sub { font-size:10px; color:var(--muted); margin-top:3px; letter-spacing:2px; text-transform:uppercase; }
    .nav-section { padding:0 12px; }
    .nav-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; padding:16px 10px 6px; }
    .nav-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; cursor:pointer; color:var(--muted); font-size:13px; font-weight:500; transition:all .2s; margin-bottom:2px; user-select:none; }
    .nav-item:hover { color:#fff; background:rgba(255,255,255,.06); }
    .nav-item.active { color:#fff; background:var(--accent); box-shadow:0 4px 12px rgba(16,185,129,.25); }
    .nav-item .badge { margin-left:auto; background:var(--warn); color:#fff; font-size:10px; font-weight:700; padding:1px 6px; border-radius:10px; }
    .nav-item.active .badge { background:rgba(255,255,255,.3); }
    .sidebar-bottom { margin-top:auto; padding:16px 12px; border-top:1px solid rgba(255,255,255,.06); }
    .admin-info { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; }
    .admin-avatar { width:34px; height:34px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:#fff; flex-shrink:0; }
    .admin-name { font-size:13px; font-weight:600; }
    .admin-role { font-size:11px; color:var(--muted); }
    .btn-logout { display:flex; align-items:center; gap:8px; padding:9px 12px; border-radius:8px; cursor:pointer; color:var(--muted); font-size:13px; transition:.2s; margin-top:4px; }
    .btn-logout:hover { color:#fff; background:rgba(255,255,255,.06); }

    main { flex-grow:1; margin-left:240px; padding:32px 36px; }
    #content-area { animation:fadeIn .3s ease-out; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; }
    .page-heading { font-size:22px; font-weight:800; color:var(--text); }
    .top-right { display:flex; align-items:center; gap:12px; }

    /* 상태 pill */
    .status-pill { padding:5px 14px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:.5px; border:1px solid; transition:.3s; }
    .status-pill.ok      { background:rgba(16,185,129,.08); color:var(--accent); border-color:rgba(16,185,129,.3); }
    .status-pill.loading { background:rgba(245,158,11,.08); color:var(--warn); border-color:rgba(245,158,11,.3); }
    .status-pill.error   { background:rgba(239,68,68,.08); color:var(--danger); border-color:rgba(239,68,68,.3); }

    /* 알림 버튼 */
    .icon-btn {
      width:34px; height:34px; border-radius:8px; background:var(--card);
      border:1px solid var(--border); display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:.2s; color:var(--text2); position:relative;
    }
    .icon-btn:hover { background:var(--bg); color:var(--text); }
    .notif-dot {
      position:absolute; top:-3px; right:-3px;
      width:16px; height:16px; border-radius:50%;
      background:var(--danger); color:#fff;
      font-size:9px; font-weight:700;
      display:none; align-items:center; justify-content:center;
      border:2px solid var(--bg);
    }
    .notif-dot.show { display:flex; }

    /* 알림 드롭다운 */
    .notif-panel {
      position:absolute; top:calc(100% + 8px); right:0;
      width:320px; background:#fff; border:1px solid var(--border);
      border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,.12);
      z-index:200; display:none;
    }
    .notif-panel.show { display:block; }
    .notif-header { padding:14px 16px; border-bottom:1px solid var(--border); font-size:13px; font-weight:700; display:flex; justify-content:space-between; align-items:center; }
    .notif-clear { font-size:11px; color:var(--accent); cursor:pointer; font-weight:600; }
    .notif-list { max-height:280px; overflow-y:auto; }
    .notif-item { padding:12px 16px; border-bottom:1px solid #f8fafc; cursor:pointer; transition:.15s; }
    .notif-item:hover { background:#f8fafc; }
    .notif-item:last-child { border-bottom:none; }
    .notif-item-title { font-size:12px; font-weight:600; color:var(--text); margin-bottom:3px; }
    .notif-item-desc  { font-size:11px; color:var(--text2); }
    .notif-empty { padding:28px 16px; text-align:center; color:var(--muted); font-size:12px; }
    .notif-wrap { position:relative; }

    .stat-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:24px; }
    .stat-card { background:var(--card); border-radius:14px; padding:20px; border:1px solid var(--border); position:relative; overflow:hidden; transition:.2s; }
    .stat-card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.06); }
    .stat-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; }
    .stat-card.c-green::after { background:var(--accent); }
    .stat-card.c-warn::after  { background:var(--warn); }
    .stat-card.c-danger::after{ background:var(--danger); }
    .stat-card.c-info::after  { background:var(--info); }
    .stat-label { font-size:11px; color:var(--text2); font-weight:600; margin-bottom:10px; text-transform:uppercase; letter-spacing:.5px; }
    .stat-value { font-size:28px; font-weight:800; color:var(--text); line-height:1; }
    .stat-unit  { font-size:13px; color:var(--muted); font-weight:400; margin-left:2px; }
    .stat-card.c-warn  .stat-value { color:var(--warn); }
    .stat-card.c-danger .stat-value{ color:var(--danger); }

    .bottom-grid { display:grid; grid-template-columns:2fr 1.1fr; gap:20px; }
    .ha-box { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px; }
    .box-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
    .box-title { font-size:15px; font-weight:700; }
    .box-more { font-size:12px; color:var(--accent); cursor:pointer; font-weight:600; background:none; border:none; }
    .notice-list { list-style:none; margin:0; padding:0; }
    .notice-item { display:flex; align-items:center; gap:10px; padding:11px 0; border-bottom:1px dashed var(--border); }
    .notice-item:last-child { border:none; padding-bottom:0; }
    .notice-tag { flex-shrink:0; font-size:10px; padding:2px 7px; border-radius:4px; font-weight:700; }
    .tag-urgent  { background:rgba(239,68,68,.1); color:var(--danger); }
    .tag-general { background:var(--bg); color:var(--text2); }
    .notice-title { flex:1; font-size:13px; color:var(--text); cursor:pointer; }
    .notice-title:hover { color:var(--accent); }
    .notice-date { font-size:11px; color:var(--muted); flex-shrink:0; }
    .quick-box { background:var(--sidebar); border-radius:16px; padding:24px; }
    .quick-title { font-size:15px; font-weight:700; color:#fff; margin-bottom:18px; }
    .quick-btn { display:block; width:100%; text-align:left; padding:14px 16px; border-radius:10px; border:none; cursor:pointer; font-size:13px; font-weight:500; margin-bottom:10px; transition:.2s; }
    .quick-btn:last-child { margin-bottom:0; }
    .quick-btn.ghost   { background:rgba(255,255,255,.07); color:#fff; }
    .quick-btn.ghost:hover { background:rgba(255,255,255,.12); }
    .quick-btn.primary { background:var(--accent); color:#fff; }
    .quick-btn.primary:hover { background:var(--accent2); }

    .loading-wrap { display:flex; align-items:center; justify-content:center; height:200px; color:var(--muted); font-size:14px; gap:10px; }
    .spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── 햄버거 버튼 ── */
    .hamburger {
      display:none; flex-direction:column; justify-content:center; gap:5px;
      width:36px; height:36px; cursor:pointer; padding:6px;
      border-radius:8px; border:1px solid var(--border); background:var(--card);
    }
    .hamburger span { display:block; height:2px; background:var(--text); border-radius:2px; transition:.3s; }

    /* ── 사이드바 오버레이 (모바일) ── */
    .sidebar-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:99;
    }
    .sidebar-overlay.show { display:block; }

    /* ── 반응형 ── */
    @media (max-width:768px) {
      aside {
        transform:translateX(-100%);
        transition:transform .3s ease;
        z-index:200;
      }
      aside.open { transform:translateX(0); }

      main { margin-left:0; padding:16px; }

      .top-bar { margin-bottom:16px; }
      .page-heading { font-size:17px; }
      .status-pill { display:none; }

      .hamburger { display:flex; }

      /* 카드 그리드 — 2열 */
      .stat-grid { grid-template-columns:repeat(2,1fr) !important; gap:10px; }
      .stat-card { padding:14px; }
      .stat-value { font-size:22px; }

      /* 하단 그리드 — 1열 */
      .bottom-grid { grid-template-columns:1fr; }

      /* 테이블 — 가로 스크롤 */
      .tbl-wrap, #receipt-page .tbl-wrap, #slots-page .tbl-wrap,
      #settle-page .tbl-wrap, #expire-page .tbl-wrap {
        overflow-x:auto;
        -webkit-overflow-scrolling:touch;
      }

      /* 필터바 — 줄바꿈 */
      .filter-bar, #receipt-page .filter-bar, #slots-page .filter-bar,
      #settle-page .filter-bar, #expire-page .filter-bar {
        flex-wrap:wrap;
        gap:6px;
      }

      /* 현황 카드 (접수관리, 전체슬롯) */
      .stat-bar { grid-template-columns:1fr 1fr !important; gap:8px; }
      .sb-val { font-size:18px !important; }

      /* 알림 패널 */
      .notif-panel { width:280px; right:-60px; }
    }
  </style>
</head>
<body>

<aside id="sidebar">
  <div class="brand" onclick="loadDashboard()">
    <div class="brand-name">HIGHER <span>AD</span></div>
    <div class="brand-sub">Admin Portal</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">Management</div>
    <div class="nav-item" id="nav-slots"   onclick="loadPage('진행현황.html',this)"><i data-lucide="layers" size="16"></i> 진행 현황</div>
    <div class="nav-item" id="nav-pending" onclick="loadPage('접수관리.html',this)"><i data-lucide="inbox" size="16"></i> 접수 관리<span class="badge" id="pending-badge" style="display:none">0</span></div>
    <div class="nav-item" id="nav-expire"  onclick="loadPage('만료예정.html',this)"><i data-lucide="clock-alert" size="16"></i> 만료 예정</div>
    <div class="nav-label">Finance & Users</div>
    <div class="nav-item" id="nav-settle"  onclick="loadPage('정산관리.html',this)"><i data-lucide="wallet" size="16"></i> 정산 관리</div>
    <div class="nav-item" id="nav-users"   onclick="loadPage('회원관리.html',this)"><i data-lucide="users" size="16"></i> 회원 관리</div>
    <div class="nav-item" id="nav-notice"  onclick="loadPage('공지사항.html',this)"><i data-lucide="megaphone" size="16"></i> 공지사항</div>
    <div class="nav-label">Tools</div>
    <div class="nav-item" id="nav-adclassify" onclick="loadAdClassify(this)"><i data-lucide="table-2" size="16"></i> 광고 분류</div>
  </div>
  <div class="sidebar-bottom">
    <div class="admin-info">
      <div class="admin-avatar">A</div>
      <div><div class="admin-name">관리자</div><div class="admin-role">Super Admin</div></div>
    </div>
    <div class="btn-logout" onclick="doLogout()">
      <i data-lucide="log-out" size="15"></i> 로그아웃
    </div>
  </div>
</aside>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<main>
  <div class="top-bar">
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="hamburger" id="hamburger" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
      </div>
      <div class="page-heading" id="page-heading">운영 현황 대시보드</div>
    </div>
    <div class="top-right">
      <!-- Firebase 연결 상태 -->
      <div class="status-pill loading" id="status-pill">● 연결 중...</div>

      <!-- 알림 버튼 -->
      <div class="notif-wrap">
        <div class="icon-btn" onclick="toggleNotif()">
          <i data-lucide="bell" size="16"></i>
          <div class="notif-dot" id="notif-dot"></div>
        </div>
        <div class="notif-panel" id="notif-panel">
          <div class="notif-header">
            알림
            <span class="notif-clear" onclick="clearNotifs()">모두 지우기</span>
          </div>
          <div class="notif-list" id="notif-list">
            <div class="notif-empty">새 알림이 없습니다.</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="content-area">
    <div class="loading-wrap"><div class="spinner"></div> 데이터 불러오는 중...</div>
  </div>
</main>

<script type="module">
  import HA from './ha-store.js';

  window.HA = HA;

  // ── 로그아웃 ──────────────────────────────────────────────
  window.doLogout = () => {
    HA.logout();
    sessionStorage.removeItem('ha_admin_auth');
    location.href = 'admin-login.html';
  };

  // ── 알림 관련 ─────────────────────────────────────────────
  let notifications = JSON.parse(sessionStorage.getItem('ha_notifs') || '[]');
  let prevPending   = null;
  let notifOpen     = false;

  function saveNotifs() {
    sessionStorage.setItem('ha_notifs', JSON.stringify(notifications.slice(0, 20)));
  }

  function renderNotifPanel() {
    const dot  = document.getElementById('notif-dot');
    const list = document.getElementById('notif-list');
    if (!notifications.length) {
      dot.classList.remove('show');
      list.innerHTML = '<div class="notif-empty">새 알림이 없습니다.</div>';
      return;
    }
    dot.textContent = notifications.length > 9 ? '9+' : notifications.length;
    dot.classList.add('show');
    list.innerHTML = notifications.map((n, i) => `
      <div class="notif-item" onclick="handleNotif(${i})">
        <div class="notif-item-title">${n.title}</div>
        <div class="notif-item-desc">${n.desc}</div>
      </div>`).join('');
  }

  window.toggleNotif = function() {
    const panel = document.getElementById('notif-panel');
    notifOpen = !notifOpen;
    panel.classList.toggle('show', notifOpen);
  };

  window.clearNotifs = function() {
    notifications = [];
    saveNotifs();
    renderNotifPanel();
  };

  window.handleNotif = function(i) {
    document.getElementById('notif-panel').classList.remove('show');
    notifOpen = false;
    loadPage('접수관리.html', document.getElementById('nav-pending'));
  };

  // 패널 외부 클릭 시 닫기
  document.addEventListener('click', e => {
    if (notifOpen && !e.target.closest('.notif-wrap')) {
      document.getElementById('notif-panel').classList.remove('show');
      notifOpen = false;
    }
  });

  // ── 대시보드 렌더 ─────────────────────────────────────────
  window.renderDashboard = async function() {
    const area = document.getElementById('content-area');
    area.innerHTML = '<div class="loading-wrap"><div class="spinner"></div> 데이터 불러오는 중...</div>';

    const [s, allNotices, allUsers, allSlots] = await Promise.all([
      HA.getDashboardStats(),
      HA.getNotices(),
      HA.getUsers(),
      HA.getSlots(),
    ]);
    const notices = allNotices.slice(0, 4);

    const agencies       = allUsers.filter(u => u.approved !== false).length;
    const activeSlots    = allSlots.filter(sl => sl.status === 'active');
    const activeAgencies = new Set(activeSlots.map(sl => sl.agencyId)).size;
    const totalTarget    = activeSlots.reduce((a, sl) => a + (sl.dailyTarget||0), 0);

    area.innerHTML = `
      <div class="stat-grid" style="grid-template-columns:repeat(7,1fr)">
        <div class="stat-card c-info"><div class="stat-label">영업점</div><div class="stat-value">${agencies}<span class="stat-unit">곳</span></div></div>
        <div class="stat-card c-green"><div class="stat-label">진행중 영업점</div><div class="stat-value">${activeAgencies}<span class="stat-unit">곳</span></div></div>
        <div class="stat-card c-green"><div class="stat-label">진행중 슬롯</div><div class="stat-value">${s.activeSlots}<span class="stat-unit">개</span></div></div>
        <div class="stat-card c-green"><div class="stat-label">전체 목표</div><div class="stat-value">${totalTarget.toLocaleString()}<span class="stat-unit">개</span></div></div>
        <div class="stat-card c-warn"><div class="stat-label">만료 예정(3일)</div><div class="stat-value">${s.expiringSoon}<span class="stat-unit">건</span></div></div>
        <div class="stat-card c-info"><div class="stat-label">승인 대기</div><div class="stat-value">${s.pending}<span class="stat-unit">건</span></div></div>
        <div class="stat-card c-danger"><div class="stat-label">반려</div><div class="stat-value">${s.rejected}<span class="stat-unit">건</span></div></div>
      </div>
      <div class="bottom-grid">
        <div class="ha-box">
          <div class="box-header">
            <span class="box-title">공지사항</span>
            <button class="box-more" onclick="loadPage('공지사항.html',document.getElementById('nav-notice'))">더보기</button>
          </div>
          <ul class="notice-list">
            ${notices.length ? notices.map(n => `
              <li class="notice-item">
                ${n.pinned ? '<span class="notice-tag tag-urgent">필독</span>' : '<span class="notice-tag tag-general">일반</span>'}
                <span class="notice-title" onclick="loadPage('공지사항.html',document.getElementById('nav-notice'))">${n.title}</span>
                <span class="notice-date">${(n.date||'').slice(5,10)}</span>
              </li>`).join('') : '<li style="color:var(--muted);font-size:13px;padding:12px 0">공지사항이 없습니다.</li>'}
          </ul>
        </div>
        <div class="quick-box">
          <div class="quick-title">Quick Action</div>
          <button class="quick-btn ghost"   onclick="loadPage('접수관리.html',document.getElementById('nav-pending'))">📥 &nbsp;신규 접수 확인하기</button>
          <button class="quick-btn primary" onclick="loadPage('정산관리.html',document.getElementById('nav-settle'))">💰 &nbsp;미정산 내역 확인</button>
          <button class="quick-btn ghost"   onclick="loadPage('만료예정.html',document.getElementById('nav-expire'))">⏰ &nbsp;만료 예정 슬롯 보기</button>
          <button class="quick-btn ghost"   onclick="loadPage('회원관리.html',document.getElementById('nav-users'))">👤 &nbsp;신규 회원 승인하기</button>
        </div>
      </div>`;

    lucide.createIcons();
  };

  window.loadDashboard = function() {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById('page-heading').textContent = '운영 현황 대시보드';
    renderDashboard();
    window.scrollTo(0, 0);
  };

  window.loadPage = async function(page, navEl) {
    if (navEl) {
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      navEl.classList.add('active');
    }
    const titles = {
      '진행현황.html':'진행 현황', '접수관리.html':'접수 관리',
      '만료예정.html':'만료 예정 현황', '정산관리.html':'정산 관리',
      '회원관리.html':'회원 관리',      '공지사항.html':'공지사항',
    };
    document.getElementById('page-heading').textContent = titles[page] || page;

    const area = document.getElementById('content-area');
    area.innerHTML = '<div class="loading-wrap"><div class="spinner"></div> 불러오는 중...</div>';

    try {
      const res = await fetch(page + '?v=' + Date.now());
      if (!res.ok) throw new Error();
      const html = await res.text();

      const doc = new DOMParser().parseFromString(html, 'text/html');
      area.innerHTML = '';

      doc.body.childNodes.forEach(node => {
        if (node.nodeName !== 'SCRIPT') {
          area.appendChild(document.importNode(node, true));
        }
      });

      doc.body.querySelectorAll('script').forEach(old => {
        const blob = new Blob([old.textContent], { type: 'application/javascript' });
        const url  = URL.createObjectURL(blob);
        const s    = document.createElement('script');
        s.src      = url;
        document.body.appendChild(s);
        s.onload = () => URL.revokeObjectURL(url);
      });

      lucide.createIcons();
      window.scrollTo(0, 0);
    } catch(err) {
      console.error('loadPage error:', err);
      area.innerHTML = `<div style="padding:80px;text-align:center;background:#fff;border-radius:16px;border:1px solid var(--border)">
        <p style="color:var(--text2);font-size:14px">${page} 파일을 찾을 수 없습니다.</p></div>`;
    }
  };

  // ── Firebase 실시간 리스너 ────────────────────────────────
  // ── 알림 디바운스 ─────────────────────────────────────────
  let notifTimer = null;
  let pendingDiff = 0;

  HA.onSlotsChange(slots => {
    const n = slots.filter(s => s.status === 'pending').length;

    // 배지 업데이트
    const el = document.getElementById('pending-badge');
    if (el) { el.textContent = n; el.style.display = n > 0 ? '' : 'none'; }

    // Firebase 연결 성공 표시
    const pill = document.getElementById('status-pill');
    if (pill) {
      pill.textContent = '● 연결됨';
      pill.className = 'status-pill ok';
    }

    // 새 접수 알림 — 디바운스로 묶어서 한 번만 생성
    if (prevPending !== null && n > prevPending) {
      pendingDiff += n - prevPending;
      if (notifTimer) clearTimeout(notifTimer);
      notifTimer = setTimeout(() => {
        notifications.unshift({
          title: `📥 새 슬롯 접수 ${pendingDiff}건`,
          desc:  `승인 대기 총 ${n}건 · ${new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'})}`,
        });
        pendingDiff = 0;
        notifTimer = null;
        saveNotifs();
        renderNotifPanel();
      }, 1500);
    }
    prevPending = n;
    renderNotifPanel();
  });

  // ── 앱 시작 ───────────────────────────────────────────────
  async function init() {
    if (sessionStorage.getItem('ha_admin_auth') !== '1') {
      location.href = 'admin-login.html';
      return;
    }
    document.body.style.display = 'flex';
    await HA.seedIfEmpty();
    await renderDashboard();
    lucide.createIcons();
  }

  // ── 사이드바 토글 (모바일) ──────────────────────────────────
  window.toggleSidebar = function() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('show');
  };
  window.closeSidebar = function() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('show');
  };

  // 메뉴 클릭 시 모바일에서 자동으로 사이드바 닫기
  const origLoadPage = window.loadPage;
  window.loadPage = function(page, el) {
    closeSidebar();
    origLoadPage(page, el);
  };

  init();

  /* ══════════════════════════════════════════════
     광고 분류 모듈 (index.html 인라인 — XLSX 라이브러리 공유)
  ══════════════════════════════════════════════ */
  const AC_GROUPS_KEY = 'ha_ad_groups_v2';
  const AC_RESULT_KEY = 'ha_ad_result_v2';
  const AC_FILE_KEY   = 'ha_ad_filename_v2';

  const AC_DEFAULT_GROUPS = [
    {name:'대행사',   stores:[]},
    {name:'직광고주', stores:[]},
    {name:'단독',     stores:[]},
  ];

  function acLoadGroups(){ try{return JSON.parse(localStorage.getItem(AC_GROUPS_KEY))||AC_DEFAULT_GROUPS;}catch{return AC_DEFAULT_GROUPS;} }
  function acSaveGroups(g){ localStorage.setItem(AC_GROUPS_KEY, JSON.stringify(g)); }
  function acLoadResult(){ try{return JSON.parse(localStorage.getItem(AC_RESULT_KEY))||null;}catch{return null;} }
  function acSaveResult(r){ localStorage.setItem(AC_RESULT_KEY, JSON.stringify(r)); }
  function acNormStore(s){ return String(s||'').toLowerCase().replace(/\s+/g,'').replace(/[^\w가-힣]/g,'').trim(); }
  function acNormType(s){ return String(s||'').toLowerCase().replace(/\s+/g,'').trim(); }
  function acFmt(n){ return n?Number(n).toLocaleString():''; }
  function acGroupCls(name){ return name==='대행사'?'agency':name==='직광고주'?'direct':'solo'; }

  function acToast(msg, type='ac-success'){
    let el = document.getElementById('ac-toast');
    if(!el){ el=document.createElement('div'); el.id='ac-toast'; document.body.appendChild(el); }
    el.textContent=msg; el.className='show '+type;
    clearTimeout(el._t); el._t=setTimeout(()=>el.className='',2500);
  }

  window.loadAdClassify = function(navEl){
    closeSidebar();
    document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
    if(navEl) navEl.classList.add('active');
    document.getElementById('page-heading').textContent='광고 분류';

    const area = document.getElementById('content-area');
    area.innerHTML = `
      <div id="ac-page">
        <div class="ac-section-title">📂 엑셀 파일 업로드</div>
        <div class="ac-upload-zone" id="ac-zone">
          <input type="file" id="ac-file-input" accept=".xls,.xlsx">
          <div class="ac-upload-icon">📊</div>
          <div class="ac-upload-label">파일을 클릭하거나 드래그하여 업로드</div>
          <div class="ac-upload-sub">.xls / .xlsx 형식 지원</div>
          <div class="ac-upload-fname" id="ac-fname"></div>
        </div>

        <div class="ac-section-title">🏷️ 구분 설정</div>
        <div class="ac-group-editor" id="ac-group-editor"></div>

        <button class="ac-run-btn" id="ac-run-btn" disabled onclick="acRunClassify()">▶&nbsp; 분류 실행</button>

        <div class="ac-result-wrap" id="ac-result-wrap" style="display:none">
          <div class="ac-result-hdr">
            <div>
              <div class="ac-result-title">분류 결과</div>
              <div class="ac-result-meta" id="ac-result-meta"></div>
            </div>
            <button class="ac-export-btn" onclick="acExportCSV()">⬇ CSV 다운로드</button>
          </div>
          <div class="ac-tbl-wrap">
            <table class="ac-tbl">
              <thead><tr>
                <th>구분</th><th>업체명</th>
                <th>NS트래픽</th><th>NP트래픽</th><th>NP저장</th>
                <th>N자동완성</th><th>방문미션</th><th>합계</th><th>총합계</th>
              </tr></thead>
              <tbody id="ac-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>`;

    lucide.createIcons();
    acInitPage();
    window.scrollTo(0,0);
  };

  function acInitPage(){
    acRenderGroups();

    // 파일 저장된 이름 복원
    const fname = localStorage.getItem(AC_FILE_KEY);
    if(fname){
      const el=document.getElementById('ac-fname');
      el.textContent='📎 '+fname+' (이전 결과 유지 중)';
      el.style.display='block';
      document.getElementById('ac-run-btn').disabled=false;
    }

    // 이전 결과 복원
    const saved=acLoadResult();
    if(saved) acRenderResult(saved);

    // 드래그앤드롭
    const zone=document.getElementById('ac-zone');
    zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag-over');});
    zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over'));
    zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag-over');if(e.dataTransfer.files[0])acHandleFile(e.dataTransfer.files[0]);});
    document.getElementById('ac-file-input').addEventListener('change',e=>{if(e.target.files[0])acHandleFile(e.target.files[0]);});
  }

  window._acUploadedData = null;

  function acHandleFile(file){
    const fn=document.getElementById('ac-fname');
    fn.textContent='📎 '+file.name;
    fn.style.display='block';
    localStorage.setItem(AC_FILE_KEY, file.name);

    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        window._acUploadedData=rows.slice(1).map(r=>({
          storeN:acNormStore(String(r[2]||'').split(',').pop()),
          typeN: acNormType(r[9]),
          goal:  Number(r[15])||0
        })).filter(r=>r.storeN);
        document.getElementById('ac-run-btn').disabled=false;
        acToast('✅ '+file.name+' 로드 완료 ('+window._acUploadedData.length+'행)');
      }catch(err){
        acToast('파일 파싱 실패: '+err.message,'ac-error');
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function acRenderGroups(){
    const groups=acLoadGroups();
    const el=document.getElementById('ac-group-editor');
    if(!el) return;
    el.innerHTML=groups.map((g,gi)=>{
      const cls=acGroupCls(g.name);
      const tags=g.stores.map((s,si)=>`
        <span class="ac-tag">
          ${s.replace(/주식회사|\(주\)/g,'').trim()}
          <span class="ac-del" onclick="acRemoveStore(${gi},${si})">×</span>
        </span>`).join('');
      return `<div class="ac-group-row">
        <div class="ac-group-label ${cls}">${g.name}</div>
        <div class="ac-group-stores">
          ${tags}
          <input class="ac-add-input" id="ac-inp-${gi}" placeholder="업체명 입력 후 Enter"
            onkeydown="acAddStore(event,${gi})">
        </div>
      </div>`;
    }).join('');
  }

  window.acRemoveStore=function(gi,si){
    const g=acLoadGroups(); g[gi].stores.splice(si,1); acSaveGroups(g); acRenderGroups();
  };
  window.acAddStore=function(e,gi){
    if(e.key!=='Enter') return;
    const val=e.target.value.trim(); if(!val) return;
    const g=acLoadGroups();
    if(!g[gi].stores.includes(val)) g[gi].stores.push(val);
    acSaveGroups(g); acRenderGroups();
    setTimeout(()=>{const inp=document.getElementById('ac-inp-'+gi);if(inp)inp.focus();},0);
  };

  window.acRunClassify=function(){
    if(!window._acUploadedData){ acToast('먼저 파일을 업로드해주세요','ac-error'); return; }
    const groups=acLoadGroups();
    const groupSums=groups.map(g=>({
      name:g.name,
      stores:g.stores.map(sName=>{
        const key=acNormStore(sName);
        let ns=0,np=0,nps=0,na=0,vm=0;
        window._acUploadedData.forEach(r=>{
          if(r.storeN!==key) return;
          const t=r.typeN;
          if(t.startsWith('ns트래픽'))  ns +=r.goal;
          else if(t.startsWith('np트래픽'))  np +=r.goal;
          else if(t.startsWith('np저장'))    nps+=r.goal;
          else if(t.startsWith('n자동완성')) na +=r.goal;
          else if(t.startsWith('방문미션'))  vm +=r.goal;
        });
        return{name:sName.replace(/주식회사|\(주\)/g,'').trim(),ns,np,nps,na,vm,sum:ns+np+nps+na+vm};
      }),
    })).map(g=>({...g,gSum:g.stores.reduce((a,r)=>a+r.sum,0)}));

    const total={ns:0,np:0,nps:0,na:0,vm:0,sum:0};
    groupSums.forEach(g=>g.stores.forEach(r=>{total.ns+=r.ns;total.np+=r.np;total.nps+=r.nps;total.na+=r.na;total.vm+=r.vm;total.sum+=r.sum;}));

    const result={groupSums,total,ts:new Date().toLocaleString('ko-KR')};
    acSaveResult(result);
    acRenderResult(result);
  };

  function acRenderResult(result){
    const{groupSums,total,ts}=result;
    document.getElementById('ac-result-meta').textContent='생성: '+ts;
    document.getElementById('ac-result-wrap').style.display='block';

    let html='';
    groupSums.forEach(g=>{
      if(!g.stores.length) return;
      const cls=acGroupCls(g.name);
      g.stores.forEach((r,i)=>{
        html+=`<tr class="ac-bg-${cls}">
          ${i===0?`<td rowspan="${g.stores.length}" style="font-weight:700;vertical-align:middle">${g.name}</td>`:''}
          <td>${r.name}</td>
          <td>${acFmt(r.ns)}</td><td>${acFmt(r.np)}</td><td>${acFmt(r.nps)}</td>
          <td>${acFmt(r.na)}</td><td>${acFmt(r.vm)}</td>
          <td style="font-weight:700">${acFmt(r.sum)}</td>
          ${i===0?`<td rowspan="${g.stores.length}" style="font-weight:800;vertical-align:middle">${acFmt(g.gSum)}<span class="ac-sum-badge ac-badge-${cls}">${g.name}</span></td>`:''}
        </tr>`;
      });
    });
    html+=`<tr class="ac-total-row">
      <td colspan="2" style="font-weight:800">총합</td>
      <td>${acFmt(total.ns)}</td><td>${acFmt(total.np)}</td><td>${acFmt(total.nps)}</td>
      <td>${acFmt(total.na)}</td><td>${acFmt(total.vm)}</td>
      <td style="font-weight:800">${acFmt(total.sum)}</td><td></td>
    </tr>`;

    document.getElementById('ac-tbody').innerHTML=html;
    document.getElementById('ac-result-wrap').scrollIntoView({behavior:'smooth',block:'start'});
    acToast('✅ 분류 완료');
  }

  window.acExportCSV=function(){
    const r=acLoadResult(); if(!r) return;
    const{groupSums,total}=r;
    let csv='\uFEFF구분,업체명,NS트래픽,NP트래픽,NP저장,N자동완성,방문미션,합계,총합계\n';
    groupSums.forEach(g=>g.stores.forEach((s,i)=>{
      csv+=`${i===0?g.name:''},${s.name},${s.ns||''},${s.np||''},${s.nps||''},${s.na||''},${s.vm||''},${s.sum||''},${i===0?g.gSum:''}\n`;
    }));
    csv+=`,총합,${total.ns||''},${total.np||''},${total.nps||''},${total.na||''},${total.vm||''},${total.sum||''}\n`;
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
    a.download='광고분류_'+new Date().toISOString().slice(0,10)+'.csv';
    a.click();
  };
</script>
</body>
</html>
