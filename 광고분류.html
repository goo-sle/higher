<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<style>
#ac-wrap *{box-sizing:border-box}
#ac-wrap{font-family:'Pretendard',sans-serif;color:var(--text,#1e293b)}

/* 검색 */
.ac-search-bar{display:flex;gap:10px;margin-bottom:20px}
.ac-search-input{flex:1;padding:10px 14px;border:1px solid var(--border,#e2e8f0);border-radius:10px;font-size:13px;font-family:inherit;outline:none;transition:.2s;background:#fff}
.ac-search-input:focus{border-color:var(--accent,#10b981);box-shadow:0 0 0 3px rgba(16,185,129,.1)}
.ac-search-clear{padding:10px 16px;border:1px solid var(--border,#e2e8f0);border-radius:10px;background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2,#64748b);font-family:inherit;transition:.2s;white-space:nowrap}
.ac-search-clear:hover{background:var(--bg,#f0f4f8)}

/* 결과 */
.ac-result-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ac-result-title{font-size:16px;font-weight:800}
.ac-result-meta{font-size:11px;color:var(--muted,#94a3b8);margin-top:2px}
.ac-export-btn{padding:7px 13px;border-radius:8px;border:1px solid var(--border,#e2e8f0);background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2,#64748b);transition:.2s;font-family:inherit}
.ac-export-btn:hover{background:var(--accent,#10b981);color:#fff;border-color:var(--accent,#10b981)}
.ac-tbl-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--border,#e2e8f0);background:#fff;margin-bottom:6px}
.ac-tbl{width:100%;border-collapse:collapse;font-size:13px}
.ac-tbl thead th{background:#f8fafc;padding:11px 13px;text-align:center;font-size:11px;font-weight:700;color:var(--text2,#64748b);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border,#e2e8f0);white-space:nowrap}
.ac-tbl thead th:nth-child(2){text-align:left}
.ac-tbl tbody td{padding:9px 13px;border-bottom:1px solid #f1f5f9;text-align:center;color:var(--text,#1e293b);transition:background .12s}
.ac-tbl tbody td:nth-child(2){text-align:left;font-weight:500}
.ac-tbl tbody tr:last-child td{border-bottom:none}
.ac-total-row td{background:#f1f5f9!important;font-weight:800;border-top:2px solid var(--border,#e2e8f0)}
.ac-bg-agency{background:rgba(34,197,94,.05)}.ac-bg-direct{background:rgba(245,158,11,.05)}.ac-bg-solo{background:rgba(59,130,246,.05)}
.ac-bg-agency:hover td{background:rgba(34,197,94,.1)!important}.ac-bg-direct:hover td{background:rgba(245,158,11,.1)!important}.ac-bg-solo:hover td{background:rgba(59,130,246,.1)!important}
.ac-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px}
.ac-badge-agency{background:rgba(34,197,94,.15);color:#16a34a}.ac-badge-direct{background:rgba(245,158,11,.15);color:#d97706}.ac-badge-solo{background:rgba(59,130,246,.15);color:#2563eb}
.ac-highlight{background:#fef08a;border-radius:3px;padding:0 1px}
.ac-no-result{padding:48px;text-align:center;color:var(--muted,#94a3b8);font-size:13px;background:#fff;border-radius:14px;border:1px solid var(--border,#e2e8f0)}
.ac-save-status{font-size:11px;color:var(--muted,#94a3b8);text-align:right;min-height:16px;margin-bottom:16px}

/* 구분선 */
.ac-divider{border:none;border-top:2px dashed var(--border,#e2e8f0);margin:32px 0}
.ac-sec{font-size:12px;font-weight:700;color:var(--text2,#64748b);text-transform:uppercase;letter-spacing:.8px;margin:0 0 10px}

/* 구분 편집기 */
.ac-editor{background:#fff;border:1px solid var(--border,#e2e8f0);border-radius:12px;overflow:hidden;margin-bottom:20px}
.ac-editor-row{display:flex;align-items:flex-start;border-bottom:1px solid var(--border,#e2e8f0)}
.ac-editor-row:last-child{border-bottom:none}
.ac-editor-label{width:86px;padding:14px;font-size:13px;font-weight:700;background:#f8fafc;border-right:1px solid var(--border,#e2e8f0);display:flex;align-items:flex-start;flex-shrink:0;padding-top:16px}
.ac-editor-label.agency{color:#22c55e}.ac-editor-label.direct{color:var(--warn,#f59e0b)}.ac-editor-label.solo{color:var(--info,#3b82f6)}
.ac-editor-body{flex:1;padding:12px 14px}
.ac-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;min-height:10px}
.ac-tag{display:inline-flex;align-items:center;gap:4px;background:var(--bg,#f0f4f8);border:1px solid var(--border,#e2e8f0);border-radius:6px;padding:3px 8px;font-size:12px;font-weight:500}
.ac-tag .ac-x{cursor:pointer;color:var(--muted,#94a3b8);font-size:14px;line-height:1;margin-left:2px;transition:.15s}
.ac-tag .ac-x:hover{color:var(--danger,#ef4444)}
.ac-hint{font-size:11px;color:var(--muted,#94a3b8);margin-bottom:6px}
.ac-add-row{display:flex;gap:6px}
.ac-inp{flex:1;border:1px solid var(--border,#e2e8f0);border-radius:8px;padding:8px 10px;font-size:12px;font-family:inherit;outline:none;transition:.2s;color:var(--text,#1e293b)}
.ac-inp:focus{border-color:var(--accent,#10b981);box-shadow:0 0 0 3px rgba(16,185,129,.1)}
.ac-add-btn{padding:8px 14px;border-radius:8px;border:none;background:var(--accent,#10b981);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;white-space:nowrap}
.ac-add-btn:hover{background:var(--accent2,#059669)}

/* 업로드 */
.ac-upload-zone{border:2px dashed var(--border,#e2e8f0);border-radius:14px;padding:28px 20px;text-align:center;background:#f8fafc;cursor:pointer;transition:.2s;position:relative;margin-bottom:18px}
.ac-upload-zone:hover,.ac-upload-zone.drag-over{border-color:var(--accent,#10b981);background:rgba(16,185,129,.04)}
.ac-upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.ac-upload-fname{font-size:13px;font-weight:600;color:var(--accent,#10b981);display:none;margin-top:8px}

/* 실행 버튼 */
.ac-run-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:12px;border:none;background:var(--accent,#10b981);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;font-family:inherit}
.ac-run-btn:hover:not(:disabled){background:var(--accent2,#059669);box-shadow:0 6px 20px rgba(16,185,129,.3);transform:translateY(-1px)}
.ac-run-btn:disabled{background:var(--border,#e2e8f0);color:var(--muted,#94a3b8);cursor:not-allowed;transform:none;box-shadow:none}

/* 토스트 */
#ac-toast{position:fixed;bottom:24px;right:24px;z-index:9999;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;opacity:0;transform:translateY(6px);transition:all .3s;pointer-events:none}
#ac-toast.show{opacity:1;transform:translateY(0)}
#ac-toast.ok{background:var(--accent,#10b981)}
#ac-toast.err{background:var(--danger,#ef4444)}
</style>
</head>
<body>
<div id="ac-wrap">

  <!-- 검색 -->
  <div class="ac-search-bar">
    <input class="ac-search-input" id="ac-search" placeholder="🔍  업체명 검색..." oninput="acSearch(this.value)">
    <button class="ac-search-clear" onclick="acClearSearch()">✕ 검색 초기화</button>
  </div>

  <!-- 결과 -->
  <div id="ac-result-area">
    <div class="ac-no-result">📂 하단에서 파일을 업로드하고 분류 실행 버튼을 눌러주세요.</div>
  </div>
  <div class="ac-save-status" id="ac-save-status"></div>

  <hr class="ac-divider">

  <!-- 구분 설정 -->
  <p class="ac-sec">🏷️ 구분 설정</p>
  <div class="ac-editor" id="ac-editor">
    <div style="padding:20px;text-align:center;color:var(--muted,#94a3b8);font-size:13px">불러오는 중...</div>
  </div>

  <!-- 업로드 -->
  <p class="ac-sec">📂 엑셀 파일 업로드</p>
  <div class="ac-upload-zone" id="ac-zone">
    <input type="file" id="ac-file-input" accept=".xls,.xlsx">
    <div style="font-size:28px;margin-bottom:8px">📊</div>
    <div style="font-size:14px;font-weight:600;color:var(--text,#1e293b);margin-bottom:4px">파일을 클릭하거나 드래그하여 업로드</div>
    <div style="font-size:12px;color:var(--muted,#94a3b8)">.xls / .xlsx 형식 지원</div>
    <div class="ac-upload-fname" id="ac-fname"></div>
  </div>

  <!-- 실행 -->
  <button class="ac-run-btn" id="ac-run-btn" disabled onclick="acRun()">▶&nbsp; 분류 실행</button>
</div>
<div id="ac-toast"></div>

<script>
(function(){

  /* ── XLSX 보장 로드
       index.html 경유 시: window.XLSX 이미 존재 → 즉시 cb()
       직접 열기 시: CDN에서 동적 로드                         */
  function ensureXLSX(cb){
    if(window.XLSX){ cb(); return; }
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=cb;
    s.onerror=()=>toast('XLSX 라이브러리 로드 실패. 인터넷 연결을 확인해주세요.','err');
    document.head.appendChild(s);
  }

  /* ── 유틸 ── */
  const DEFAULTS=[{name:'대행사',stores:[]},{name:'직광고주',stores:[]},{name:'단독',stores:[]}];
  const norm =s=>String(s||'').toLowerCase().replace(/\s+/g,'').replace(/[^\w가-힣]/g,'').trim();
  const normT=s=>String(s||'').toLowerCase().replace(/\s+/g,'').trim();
  const fmt  =n=>n?Number(n).toLocaleString():'';
  const gcls =n=>n==='대행사'?'agency':n==='직광고주'?'direct':'solo';

  function toast(msg,type='ok'){
    const el=document.getElementById('ac-toast');
    el.textContent=msg; el.className='show '+type;
    clearTimeout(el._t); el._t=setTimeout(()=>el.className='',2800);
  }
  function setStatus(msg){ document.getElementById('ac-save-status').textContent=msg; }

  /* ── Firebase 저장/불러오기 (window.HA 사용) ── */
  async function fbSaveGroups(groups){
    if(window.HA && window.HA.saveAdClassifyGroups)
      await window.HA.saveAdClassifyGroups(groups);
  }
  async function fbSaveResult(result){
    setStatus('저장 중...');
    try{
      if(window.HA && window.HA.saveAdClassifyResult){
        await window.HA.saveAdClassifyResult(result);
        setStatus('✅ 서버에 저장됨 · '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}));
      } else {
        setStatus('⚠️ ha-store 미연결 (서버 저장 불가)');
      }
    }catch(e){
      setStatus('❌ 저장 실패: '+e.message);
    }
  }
  async function fbLoad(){
    if(window.HA && window.HA.getAdClassify){
      const data=await window.HA.getAdClassify();
      return data||{groups:null,result:null};
    }
    return {groups:null,result:null};
  }

  /* ── 구분 편집기 ── */
  let _groups=DEFAULTS;

  function renderEditor(){
    document.getElementById('ac-editor').innerHTML=_groups.map((g,gi)=>{
      const cls=gcls(g.name);
      const tags=(g.stores||[]).length
        ?(g.stores).map((s,si)=>`<span class="ac-tag">${s}<span class="ac-x" onclick="acRemove(${gi},${si})">×</span></span>`).join('')
        :'<span style="font-size:11px;color:var(--muted,#94a3b8)">업체 없음</span>';
      return `<div class="ac-editor-row">
        <div class="ac-editor-label ${cls}">${g.name}</div>
        <div class="ac-editor-body">
          <div class="ac-tags" id="ac-tags-${gi}">${tags}</div>
          <div class="ac-hint">쉼표(,)로 여러 업체를 한 번에 추가할 수 있습니다</div>
          <div class="ac-add-row">
            <input class="ac-inp" id="ac-inp-${gi}" placeholder="예) 업체A, 업체B, 업체C"
              onkeydown="if(event.key==='Enter'){event.preventDefault();acAdd(${gi})}">
            <button class="ac-add-btn" onclick="acAdd(${gi})">추가</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  window.acRemove=function(gi,si){
    _groups[gi].stores.splice(si,1);
    renderEditor();
    fbSaveGroups(_groups);
  };
  window.acAdd=function(gi){
    const inp=document.getElementById('ac-inp-'+gi);
    const vals=inp.value.split(',').map(v=>v.trim()).filter(Boolean);
    if(!vals.length) return;
    vals.forEach(v=>{if(!_groups[gi].stores.includes(v))_groups[gi].stores.push(v);});
    inp.value='';
    renderEditor();
    fbSaveGroups(_groups);
    toast(`✅ ${vals.length}개 업체 추가됨`);
  };

  /* ── 파일 업로드 ── */
  window._acData=null;

  function setupUpload(){
    const zone=document.getElementById('ac-zone');
    zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag-over');});
    zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over'));
    zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag-over');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
    document.getElementById('ac-file-input').addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0]);});
  }

  function handleFile(file){
    const fn=document.getElementById('ac-fname');
    fn.textContent='📎 '+file.name; fn.style.display='block';

    ensureXLSX(()=>{
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const wb=XLSX.read(ev.target.result,{type:'array'});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
          window._acData=rows.slice(1).map(r=>({
            storeN:norm(String(r[2]||'').split(',').pop()),
            typeN: normT(r[9]),
            goal:  Number(r[15])||0
          })).filter(r=>r.storeN);
          document.getElementById('ac-run-btn').disabled=false;
          toast('✅ '+file.name+' 로드 완료 ('+window._acData.length+'행)');
        }catch(err){
          toast('파일 파싱 실패: '+err.message,'err');
        }
      };
      reader.readAsArrayBuffer(file);
    });
  }

  /* ── 분류 실행 ── */
  window.acRun=async function(){
    if(!window._acData){toast('먼저 파일을 업로드해주세요','err');return;}

    const groupSums=_groups.map(g=>({
      name:g.name,
      stores:(g.stores||[]).map(sName=>{
        const key=norm(sName);
        let ns=0,np=0,nps=0,na=0,vm=0;
        window._acData.forEach(r=>{
          if(r.storeN!==key)return;
          const t=r.typeN;
          if(t.startsWith('ns트래픽'))       ns +=r.goal;
          else if(t.startsWith('np트래픽'))  np +=r.goal;
          else if(t.startsWith('np저장'))    nps+=r.goal;
          else if(t.startsWith('n자동완성')) na +=r.goal;
          else if(t.startsWith('방문미션'))  vm +=r.goal;
        });
        return{name:sName.replace(/주식회사|\(주\)/g,'').trim(),raw:sName,ns,np,nps,na,vm,sum:ns+np+nps+na+vm};
      }),
    })).map(g=>({...g,gSum:g.stores.reduce((a,r)=>a+r.sum,0)}));

    const total={ns:0,np:0,nps:0,na:0,vm:0,sum:0};
    groupSums.forEach(g=>g.stores.forEach(r=>{
      total.ns+=r.ns;total.np+=r.np;total.nps+=r.nps;total.na+=r.na;total.vm+=r.vm;total.sum+=r.sum;
    }));

    const result={groupSums,total,ts:new Date().toLocaleString('ko-KR')};
    await fbSaveResult(result);
    renderResult(result,'');
    toast('✅ 분류 완료');
  };

  /* ── 결과 렌더 ── */
  function renderResult(result,keyword){
    if(!result){
      document.getElementById('ac-result-area').innerHTML='<div class="ac-no-result">📂 하단에서 파일을 업로드하고 분류 실행 버튼을 눌러주세요.</div>';
      return;
    }
    const{groupSums,total,ts}=result;
    const kw=(keyword||'').trim().toLowerCase();
    const esc=s=>s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');

    let tbody='',visible=0;
    groupSums.forEach(g=>{
      if(!(g.stores||[]).length)return;
      const cls=gcls(g.name);
      const stores=kw?g.stores.filter(r=>r.name.toLowerCase().includes(kw)||r.raw.toLowerCase().includes(kw)):g.stores;
      if(!stores.length)return;
      visible+=stores.length;
      stores.forEach((r,i)=>{
        const hl=txt=>kw&&txt.toLowerCase().includes(kw)
          ?txt.replace(new RegExp(esc(kw),'gi'),m=>`<mark class="ac-highlight">${m}</mark>`)
          :txt;
        tbody+=`<tr class="ac-bg-${cls}">
          ${i===0?`<td rowspan="${stores.length}" style="font-weight:700;vertical-align:middle">${g.name}</td>`:''}
          <td>${hl(r.name)}</td>
          <td>${fmt(r.ns)}</td><td>${fmt(r.np)}</td><td>${fmt(r.nps)}</td>
          <td>${fmt(r.na)}</td><td>${fmt(r.vm)}</td>
          <td style="font-weight:700">${fmt(r.sum)}</td>
          ${i===0?`<td rowspan="${stores.length}" style="font-weight:800;vertical-align:middle;white-space:nowrap">${fmt(g.gSum)}<span class="ac-badge ac-badge-${cls}">${g.name}</span></td>`:''}
        </tr>`;
      });
    });

    if(kw&&!visible){
      document.getElementById('ac-result-area').innerHTML=`<div class="ac-no-result">🔍 "<b>${keyword}</b>" 검색 결과가 없습니다.</div>`;
      return;
    }
    if(!kw){
      tbody+=`<tr class="ac-total-row">
        <td colspan="2" style="font-weight:800">총합</td>
        <td>${fmt(total.ns)}</td><td>${fmt(total.np)}</td><td>${fmt(total.nps)}</td>
        <td>${fmt(total.na)}</td><td>${fmt(total.vm)}</td>
        <td style="font-weight:800">${fmt(total.sum)}</td><td></td>
      </tr>`;
    }

    document.getElementById('ac-result-area').innerHTML=`
      <div class="ac-result-hdr">
        <div>
          <div class="ac-result-title">분류 결과${kw?` &nbsp;<span style="font-size:13px;font-weight:500;color:var(--text2,#64748b)">"${keyword}" 검색 중</span>`:''}</div>
          <div class="ac-result-meta">생성: ${ts}${kw?` &nbsp;·&nbsp; ${visible}개 업체 표시`:''}</div>
        </div>
        <button class="ac-export-btn" onclick="acExport()">⬇ CSV 다운로드</button>
      </div>
      <div class="ac-tbl-wrap">
        <table class="ac-tbl">
          <thead><tr>
            <th>구분</th><th>업체명</th>
            <th>NS트래픽</th><th>NP트래픽</th><th>NP저장</th>
            <th>N자동완성</th><th>방문미션</th><th>합계</th><th>총합계</th>
          </tr></thead>
          <tbody>${tbody}</tbody>
        </table>
      </div>`;

    // 현재 결과 메모리에 보관 (검색 재렌더용)
    window._acLastResult=result;
  }

  /* ── 검색 ── */
  window.acSearch=function(val){ if(window._acLastResult)renderResult(window._acLastResult,val); };
  window.acClearSearch=function(){
    document.getElementById('ac-search').value='';
    if(window._acLastResult)renderResult(window._acLastResult,'');
  };

  /* ── CSV 내보내기 ── */
  window.acExport=function(){
    const r=window._acLastResult; if(!r)return;
    const{groupSums,total}=r;
    let csv='\uFEFF구분,업체명,NS트래픽,NP트래픽,NP저장,N자동완성,방문미션,합계,총합계\n';
    groupSums.forEach(g=>(g.stores||[]).forEach((s,i)=>{
      csv+=`${i===0?g.name:''},${s.name},${s.ns||''},${s.np||''},${s.nps||''},${s.na||''},${s.vm||''},${s.sum||''},${i===0?g.gSum:''}\n`;
    }));
    csv+=`,총합,${total.ns||''},${total.np||''},${total.nps||''},${total.na||''},${total.vm||''},${total.sum||''}\n`;
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
    a.download='광고분류_'+new Date().toISOString().slice(0,10)+'.csv';
    a.click();
  };

  /* ── 초기화: Firebase에서 groups + result 불러오기 ── */
  async function init(){
    setupUpload();
    try{
      const data=await fbLoad();

      // 구분 설정 복원
      if(data.groups && Array.isArray(data.groups) && data.groups.length){
        _groups=data.groups;
      }
      renderEditor();

      // 이전 결과 복원
      if(data.result){
        window._acLastResult=data.result;
        renderResult(data.result,'');
        setStatus('✅ 서버에서 불러옴 · '+data.result.ts);
        // 결과가 있으면 실행 버튼도 활성화
        document.getElementById('ac-run-btn').disabled=false;
      } else {
        renderEditor();
      }
    }catch(e){
      renderEditor();
      setStatus('⚠️ 서버 불러오기 실패: '+e.message);
    }
  }

  init();
})();
</script>
</body></html>
